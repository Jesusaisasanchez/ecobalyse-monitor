name: Daily Ecobalyse Monitor

on:
  schedule:
    - cron: "0 7 * * *"
  workflow_dispatch:

jobs:
  run-script:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-python@v4

      - name: Install dependencies
        run: |
          pip install playwright
          playwright install

      - name: Run script
        run: python script.py
